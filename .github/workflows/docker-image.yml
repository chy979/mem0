on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and load the Mem0 REST API Server Docker image
      run: |
        docker buildx build ./server \
          --file ./server/Dockerfile \
          --platform linux/amd64 \
          --tag mem0-api-server:latest \
          --tag mem0-api-server:${{ github.sha }} \
          --tag ghcr.io/${{ github.repository_owner }}/mem0:main \
          --tag ghcr.io/${{ github.repository_owner }}/mem0:${{ github.sha }} \
          --load

    - name: Test the Docker image
      run: |
        docker run --rm mem0-api-server:latest python -c "import fastapi; import uvicorn; print('Dependencies OK')"

    - name: Push to GitHub Container Registry
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      run: |
        docker buildx build ./server \
          --file ./server/Dockerfile \
          --platform linux/amd64,linux/arm64 \
          --tag ghcr.io/${{ github.repository_owner }}/mem0:main \
          --tag ghcr.io/${{ github.repository_owner }}/mem0:${{ github.sha }} \
          --push
